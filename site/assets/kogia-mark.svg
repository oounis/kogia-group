<!-- ════════════════════════════════════════════════════════════════════════
     LA MARQUE KOGIA — un K. Et, dans son négatif, une nageoire caudale.

     ON VOIT D'ABORD UN K. Puis, plus tard, on remarque que les deux bras ne
     sont pas des bras : ce sont les deux LOBES d'une queue de cachalot, réunis
     sur un pédoncule, avec l'encoche médiane en espace négatif. Comme la flèche
     de FedEx : rien n'est dessiné, tout est suggéré. Et une fois vue, on ne peut
     plus la « dé-voir ».

     CE QU'IL N'Y A PAS, ET C'EST VOULU :
       • PAS D'ŒIL. Un œil fait une créature — donc une mascotte. C'était le
         défaut de toutes les versions précédentes.
       • Pas de corps, pas de sourire, pas de jet, pas de dégradé.
       • Rien de mignon. Kogia Group est une entreprise de technologie.

     L'animal est présent par ses QUALITÉS, pas par son portrait : compact,
     calme, intelligent, courbes lisses, mouvement minimal, eaux profondes.

     Aplat, currentColor. Grille 64. Testé à 16 px, en monochrome et en NOIR PUR
     avant d'être retenu. Source : brand/KOGIA_HARMONY.md §4
     ════════════════════════════════════════════════════════════════════════ -->
