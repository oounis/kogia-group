<!-- ════════════════════════════════════════════════════════════════════════
     LA MARQUE KOGIA — un K dont le bras est une NAGEOIRE CAUDALE.

     L'initiale de l'entreprise et l'animal, dans une seule forme géométrique.
     Ce n'est PAS un dessin de poisson : c'est un symbole de marque.

     Pourquoi cette forme, et pas l'ancienne baleine :
       • L'ancienne mourait à 16 px (œil, sourire, croissant → une bouillie) et
         ne survivait pas en une seule couleur. Celle-ci tient les deux.
       • Elle est PLEINE. La masse est ce qui fait survivre une marque en petit :
         les versions aux pointes effilées disparaissaient à la taille d'un favicon.
       • Les pointes sont CARRÉES — le bord de fuite d'une vraie nageoire. C'est ce
         qui la distingue d'une flèche ou d'un chevron.

     Le croissant (la fausse branchie) N'EST PAS dans le logo, délibérément : sur une
     entreprise TUNISIENNE, un croissant se lit comme le drapeau national, pas comme
     une branchie de cachalot. Il reste un motif d'interface (chargement, états vides).

     Grille 64. Aplat — jamais de dégradé dans la marque : un logo doit tenir sur un
     tampon, une facture, une icône monochrome. Le dégradé est réservé au décor.
     ════════════════════════════════════════════════════════════════════════ -->
