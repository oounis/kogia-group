<!-- Kogia Harmony — THE MARK. Logo, favicon, app tile.
     Clean, premium: body + eye + the Kogia Crescent (the false gill).
     No smile, no fin, no spout — that is the MASCOT (kogia-mascot.svg). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Kogia">
  <defs>
    <linearGradient id="k-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F57DE"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <path fill="url(#k-mark)" d="M12 54 C12 34 28 22 52 22 C74 22 88 32 91 46 C94 38 99 30 107 25 C105 32 104 38 105 43 C110 41 117 41 124 44 C117 48 111 50 106 50 C102 62 92 70 76 73 C58 76 34 74 22 68 C14 64 12 60 12 54 Z"/>
  <!-- The eye. Ink, never black. -->
  <circle cx="34" cy="45" r="4.2" fill="#0E2135"/>
  <!-- THE KOGIA CRESCENT — the false gill. The one thing that makes this mark ours. -->
  <path d="M44 42 q7 9 -1 17" fill="none" stroke="#FDF6F0" stroke-width="3.2" stroke-linecap="round" opacity=".75"/>
</svg>
