<!-- Kogia Job — product lockup. The hand + the crescent, terracotta (the ink cloud).
     Wordmark in Baloo 2 — the ONE place Baloo is allowed. It never sets a paragraph. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100"
     role="img" aria-label="Kogia Job">
  <g transform="translate(2,6) scale(.78)">
    <rect x="30" y="18" width="11" height="42" rx="5.5" fill="#E85D2F"/>
    <rect x="44" y="12" width="11" height="48" rx="5.5" fill="#E85D2F"/>
    <rect x="58" y="16" width="11" height="44" rx="5.5" fill="#E85D2F"/>
    <rect x="72" y="26" width="10" height="34" rx="5"   fill="#E85D2F"/>
    <path d="M18 44 q-8 6 -2 14 l 12 14 q 4 5 4 -2 l0 -18 z" fill="#E85D2F"/>
    <path d="M28 52 h54 v14 q0 22 -27 22 q-27 0 -27 -22 z" fill="#E85D2F"/>
    <path d="M52 60 q8 10 -1 19" fill="none" stroke="#FFF1E7" stroke-width="3.4" stroke-linecap="round" opacity=".85"/>
  </g>
  <!-- terra-ink #7C2D12 on white = 8.4:1. The vivid #E85D2F stays decorative. -->
  <text x="96" y="58" font-family="Baloo 2, Sora, system-ui, sans-serif" font-size="38"
        font-weight="800" fill="#7C2D12" letter-spacing="0.5">kogia job</text>
  <text x="98" y="80" font-family="Sora, system-ui, sans-serif" font-size="10.5"
        font-weight="700" fill="#C2410C" letter-spacing="4">PAR KOGIA GROUP</text>
</svg>
