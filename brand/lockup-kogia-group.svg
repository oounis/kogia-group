<!-- Kogia Group — lockup principal. La marque (aplat) + le mot.
     La marque prend la couleur du contexte via currentColor : indigo sur clair,
     blanc sur l'abysse. Jamais de dégradé dans un logo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72"
     font-family="Sora, system-ui, sans-serif" role="img" aria-label="Kogia Group">
  <g transform="translate(4,4) scale(.98)" color="#4F57DE"><path d="M17 11 v42" stroke="currentColor" stroke-width="7.5" stroke-linecap="round" fill="none"/><path d="M26 32 L48 9 L53 12 Q41 25 36 32 Q41 39 53 52 L48 55 Z" fill="currentColor"/></g>
  <text x="82" y="40" font-size="30" font-weight="800" fill="#0E2135" letter-spacing="-0.6">kogia</text>
  <text x="84" y="58" font-size="10" font-weight="700" fill="#4F57DE" letter-spacing="4.5">GROUP</text>
</svg>
