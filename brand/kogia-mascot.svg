<!-- Kogia Harmony — THE MASCOT. Empty states, hero scenes, success moments.
     The friendly form: crescent + smile + fin + spout.
     Never inside dense tables or forms. Never in place of the MARK in a logo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Kogia">
  <defs>
    <linearGradient id="k-mascot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F57DE"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- The spout: cyan, catching the light above the water. -->
  <path d="M42 12 q-1 -7 5 -9 M50 12 q4 -6 11 -6" fill="none" stroke="#22D3EE" stroke-width="3.4" stroke-linecap="round"/>
  <path fill="url(#k-mascot)" d="M12 54 C12 34 28 22 52 22 C74 22 88 32 91 46 C94 38 99 30 107 25 C105 32 104 38 105 43 C110 41 117 41 124 44 C117 48 111 50 106 50 C102 62 92 70 76 73 C58 76 34 74 22 68 C14 64 12 60 12 54 Z"/>
  <circle cx="34" cy="45" r="4.2" fill="#0E2135"/>
  <!-- The Kogia Crescent. -->
  <path d="M44 42 q7 9 -1 17" fill="none" stroke="#FDF6F0" stroke-width="3.2" stroke-linecap="round" opacity=".75"/>
  <!-- Smile stops short of the crescent: the two strokes must never cross. -->
  <path d="M21 56 q8 6 17 6" fill="none" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" opacity=".9"/>
  <path d="M56 62 q6 8 16 8 q-10 4 -20 -2 Z" fill="#4F57DE" opacity=".5"/>
</svg>
