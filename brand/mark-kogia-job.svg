<!-- Kogia Job — THE MARK.
     The hand stays: it IS the product ("le coup de main du quartier"; يدّي = "my hand").
     What makes it Kogia is the CRESCENT cut into the palm — the same false-gill arc the
     whale wears behind its eye. Same signature, different body. That is Kogia Harmony:
     a new product does not need a new mascot, it needs the crescent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Kogia Job">
  <rect x="30" y="18" width="11" height="42" rx="5.5" fill="#E85D2F"/>
  <rect x="44" y="12" width="11" height="48" rx="5.5" fill="#E85D2F"/>
  <rect x="58" y="16" width="11" height="44" rx="5.5" fill="#E85D2F"/>
  <rect x="72" y="26" width="10" height="34" rx="5"   fill="#E85D2F"/>
  <path d="M18 44 q-8 6 -2 14 l 12 14 q 4 5 4 -2 l0 -18 z" fill="#E85D2F"/>
  <path d="M28 52 h54 v14 q0 22 -27 22 q-27 0 -27 -22 z" fill="#E85D2F"/>
  <!-- THE KOGIA CRESCENT, in the palm. -->
  <path d="M52 60 q8 10 -1 19" fill="none" stroke="#FFF1E7" stroke-width="3.4" stroke-linecap="round" opacity=".85"/>
</svg>
