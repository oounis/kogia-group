<!-- ════════════════════════════════════════════════════════════════════════
     LA MARQUE KOGIA — le K ET le cachalot, dans une seule forme.

     Double lecture, voulue :
       • Le CACHALOT : le front busqué (la barre), l'œil, le pédoncule, la
         nageoire caudale. Le cachalot a un front presque VERTICAL — c'est
         exactement pourquoi sa tête peut servir de hampe à un K.
       • Le K : la hampe (le corps) + les deux bras (la caudale).
     Ni un poisson dessiné, ni une lettre nue : les deux à la fois.

     L'ŒIL EST UN VRAI TROU (fill-rule evenodd), pas un point blanc : la marque
     doit tenir sur N'IMPORTE QUEL fond. Un point blanc trahirait le logo dès
     qu'on le pose sur une couleur.

     Aplat, jamais de dégradé — un logo doit tenir sur un tampon, une facture,
     une icône monochrome. Grille 64. Source : brand/KOGIA_HARMONY.md §4
     ════════════════════════════════════════════════════════════════════════ -->
