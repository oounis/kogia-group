<!-- LA MARQUE KOGIA — le cachalot. C'est le logo de Kogia Group, choisi par Othman.
     Un seul symbole pour tout l'écosystème ; seule la couleur du produit change.
     L'œil est un TROU (fill-rule evenodd) : il laisse voir le fond, donc la marque
     tient sur n'importe quelle couleur sans point blanc parasite.
     Source : brand/KOGIA_HARMONY.md §4 -->
