<!-- ════════════════════════════════════════════════════════════════════════
     LA MARQUE KOGIA — UN SEUL tracé. Le K et le cachalot sont la même forme.

     Ce n'est pas une baleine posée à côté d'une lettre : c'est une silhouette
     continue. Tête busquée → œil → corps → pédoncule → nageoire caudale. Et la
     caudale EST le bras du K ; le creux entre les deux lobes EST le creux du K.
     Comme la flèche de FedEx : on voit la lettre, puis on voit l'animal, et on
     ne peut plus le « dé-voir ».

     Le cachalot a un front presque VERTICAL — c'est ce qui rend l'intégration
     possible : sa tête peut littéralement servir de hampe.

     L'ŒIL EST UN TROU (fill-rule evenodd), jamais un point blanc : un point
     blanc trahit le logo dès qu'on le pose sur une couleur.

     APLAT. Jamais de dégradé dans la marque — un logo doit tenir sur un tampon,
     une facture, une icône monochrome, en impression, en sombre et en clair.
     Il prend la couleur du contexte (currentColor).

     Grille 64. Testé à 16 px et en une seule couleur AVANT d'être retenu.
     Source : brand/KOGIA_HARMONY.md §4
     ════════════════════════════════════════════════════════════════════════ -->
